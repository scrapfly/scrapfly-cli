name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout ${{ inputs.tag }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: if the scrapfly/homebrew-tap repo is provisioned and a
          # HOMEBREW_TAP_TOKEN secret is configured, goreleaser will publish
          # the Formula automatically. If the secret is missing, goreleaser
          # skips the homebrew step with a warning rather than failing.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  goreleaser-linux-windows:
    runs-on: ubuntu-latest
    needs: goreleaser-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Stash GoReleaser config
        run: cp .goreleaser-linux-windows.yaml /tmp/.goreleaser-linux-windows.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git checkout ${{ inputs.tag }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config /tmp/.goreleaser-linux-windows.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Upload linux/windows artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums-linux-windows.txt \
            --clobber

  update-latest-tag:
    # Move the `latest` git tag to point at the version tag we just released.
    # Lets consumers `git checkout latest` or pin a moving ref without caring
    # about version numbers. GitHub Releases already exposes /releases/latest
    # automatically so the installer doesn't need this, but it's a common
    # muscle-memory tag (Docker images, Homebrew casks, etc.).
    needs: [goreleaser-darwin, goreleaser-linux-windows]
    runs-on: ubuntu-latest
    # Skip on manual re-releases of older tags (only move `latest` for the
    # newest push-triggered tag).
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-move `latest` tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${GITHUB_REF_NAME}"
          echo "Moving 'latest' to $TAG ($(git rev-parse --short "$TAG"))"
          git tag -f latest "$TAG"
          git push origin latest --force
