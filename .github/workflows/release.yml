name: release

# Tag-triggered release pipeline. Three parallel goreleaser build jobs
# produce per-OS archives as ephemeral GitHub Actions artifacts, then a
# single `publish` job downloads them all, creates the GH release with
# every asset attached, and publishes the npm wrapper. Nothing is
# published anywhere if any build fails.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write   # OIDC provenance for npm publish

jobs:
  # ── Resolve the target tag once so every downstream job agrees on it.
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - id: t
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  # ── CI gate: same checks as .github/workflows/ci.yml but pinned to the
  #    release tag. Every build job `needs: ci` so no archive ships if
  #    any check fails.
  ci:
    runs-on: ubuntu-latest
    needs: resolve-tag
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout ${{ needs.resolve-tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt issues:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build
        run: go build -o /tmp/scrapfly ./cmd/scrapfly

  # ── Three parallel build jobs — one per OS. Each runs goreleaser with
  #    --skip=publish so nothing hits GitHub Releases yet; archives land
  #    as actions artifacts that the `publish` job assembles.
  build-darwin:
    runs-on: macos-latest
    needs: [resolve-tag, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout ${{ needs.resolve-tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: |
            dist/*.tar.gz
            dist/checksums-darwin.txt
          if-no-files-found: error
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    needs: [resolve-tag, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout ${{ needs.resolve-tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish --config .goreleaser-linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: |
            dist/*.tar.gz
            dist/checksums-linux.txt
          if-no-files-found: error
          retention-days: 7

  build-windows:
    runs-on: ubuntu-latest
    needs: [resolve-tag, ci]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout ${{ needs.resolve-tag.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip=publish --config .goreleaser-windows.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/*.zip
            dist/checksums-windows.txt
          if-no-files-found: error
          retention-days: 7

  # ── All builds passed: collect artifacts, cut the GH release with every
  #    asset attached, publish the npm wrapper pointing at this tag, and
  #    move the `latest` git tag. Atomic from the user's POV — if any
  #    single step fails the release is visible as broken, not partial.
  publish:
    runs-on: ubuntu-latest
    needs: [resolve-tag, build-darwin, build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assembled assets
        run: ls -la dist/

      - name: Build combined checksums.txt
        # The self-updater (cmd/scrapfly/update.go) expects a single
        # `checksums.txt` in the release. Merge the three per-OS files.
        run: |
          cd dist
          cat checksums-darwin.txt checksums-linux.txt checksums-windows.txt > checksums.txt
          echo "=== combined checksums.txt ==="
          cat checksums.txt

      - name: Create GitHub release with all assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Release $TAG" \
              --latest \
              dist/*
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Pin npm wrapper version to tag
        working-directory: packages/npm
        run: npm version --no-git-tag-version "${{ needs.resolve-tag.outputs.version }}"

      - name: Publish npm wrapper
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}
        run: npm publish --access public --provenance

      - name: Force-move `latest` git tag
        # Only for tag pushes — skip on re-releases of older tags via
        # workflow_dispatch so we don't demote a newer `latest`.
        if: github.event_name == 'push'
        env:
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$TAG"
          git push origin latest --force
