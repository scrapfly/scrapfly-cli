version: 2

project_name: scrapfly

builds:
  - id: scrapfly
    main: ./cmd/scrapfly
    binary: scrapfly
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # Publish the raw binary — no tar/zip wrapper. The installer then
    # becomes `curl -fsSL $url -o scrapfly && chmod +x` with no extract
    # step. Windows variants get the `.exe` suffix automatically.
    formats: [binary]
    name_template: >-
      {{ .ProjectName }}-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew cask publishing is deferred until the scrapfly/homebrew-tap
# repo is provisioned and the HOMEBREW_TAP_TOKEN secret is set. See
# .goreleaser.yaml.bak-brew for the prepared block.
