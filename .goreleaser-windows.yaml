version: 2

project_name: scrapfly

builds:
  - id: scrapfly
    main: ./cmd/scrapfly
    binary: scrapfly
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.Date}}
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: default
    formats: [zip]
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums-windows.txt

release:
  # GH release is cut by the publish job from collected actions artifacts.
  disable: true

changelog:
  disable: true
